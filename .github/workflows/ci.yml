name: CI

on:
  push:
    branches: ["main", "dev", "Configure"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest

      - name: Run environment tests
        run: |
          python rl_env/env_test.py

      - name: Validate task generator
        run: |
          python workload/task_generator.py --pattern constant --count 10 --output workload/ci_tasks.csv
          python -c "import csv; f=open('workload/ci_tasks.csv', newline=''); r=list(csv.DictReader(f)); print('rows=', len(r)); assert len(r)==10"
